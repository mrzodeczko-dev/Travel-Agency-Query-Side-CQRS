server:
  port: ${SERVER_PORT}

spring:
  application:
    name: ${SPRING_APPLICATION_NAME:travel-agency-query-side}

  threads:
    virtual:
      enabled: true

  mongodb:
    uri: ${SPRING_DATA_MONGODB_URI}
  data:
    mongodb:
      repositories:
        type: imperative
      auto-index-creation: false  # Indexes are managed by Liquibase changesets

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    properties:
      schema.registry.url: ${KAFKA_SCHEMA_REGISTRY_URL}
    streams:
      application-id: ${KAFKA_STREAMS_APPLICATION_ID}
      properties:
        processing.guarantee: exactly_once_v2
        schema.registry.url: ${KAFKA_SCHEMA_REGISTRY_URL}
        num.stream.threads: ${KAFKA_STREAMS_THREADS}
        state.dir: ${KAFKA_STREAMS_STATE_DIR}
        default.deserialization.exception.handler: org.apache.kafka.streams.errors.LogAndContinueExceptionHandler
    consumer:
      group-id: ${KAFKA_PROJECTION_GROUP_ID}
      auto-offset-reset: earliest
      properties:
        key.deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
        value.deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: io.confluent.kafka.serializers.KafkaAvroDeserializer
        specific.avro.reader: true
        schema.registry.url: ${KAFKA_SCHEMA_REGISTRY_URL}
    listener:
      ack-mode: record

app:
  topics:
    bookings: ${TOPIC_BOOKINGS}
    availability: ${TOPIC_AVAILABILITY}
    availability-dlt: ${TOPIC_AVAILABILITY_DLT}
    hotels: ${TOPIC_HOTELS}
    hotels-dlt: ${TOPIC_HOTELS_DLT}
    partitions: ${TOPIC_PARTITIONS:3}
    replicas: ${TOPIC_REPLICAS:1}
  last-rooms-threshold: ${LAST_ROOMS_THRESHOLD}
  hotels:
    default-capacity: ${DEFAULT_HOTEL_CAPACITY} # Fallback capacity for hotels without availability information
    consumer-group: ${HOTELS_CONSUMER_GROUP}

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_ENABLED:false}
  swagger-ui:
    enabled: ${SPRINGDOC_ENABLED:false}

management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus,info"
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
  opentelemetry:
    tracing:
      enabled: ${TRACING_ENABLED:false}
      sampling:
        probability: ${TRACING_SAMPLING:1.0}
      export:
        otlp:
          endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://tempo:4318}
    metrics:
      export:
        otlp:
          enabled: false
    logs:
      export:
        otlp:
          enabled: false